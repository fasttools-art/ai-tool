<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>FastTools AI Hub</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:rgba(0,0,0,0.3);
backdrop-filter:blur(10px);
}

.logo{
font-size:22px;
font-weight:bold;
}

.menu{
display:flex;
gap:25px;
}

.menu a{
color:white;
text-decoration:none;
}

.hero{
text-align:center;
padding:70px 20px;
}

.hero h1{
font-size:40px;
margin-bottom:10px;
}

.hero p{
opacity:0.8;
}

.tools{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:40px;
max-width:1100px;
margin:auto;
}

.card{
background:rgba(255,255,255,0.08);
padding:30px;
border-radius:15px;
cursor:pointer;
transition:0.3s;
backdrop-filter:blur(8px);
}

.card:hover{
background:rgba(255,255,255,0.18);
transform:scale(1.05);
}

.chat{
max-width:700px;
margin:50px auto;
background:rgba(255,255,255,0.08);
padding:25px;
border-radius:15px;
}

textarea{
width:100%;
height:120px;
border-radius:10px;
border:none;
padding:10px;
font-size:16px;
}

button{
margin-top:10px;
padding:12px 25px;
border:none;
border-radius:10px;
background:#00c6ff;
color:white;
font-size:16px;
cursor:pointer;
}

#result{
margin-top:20px;
background:rgba(0,0,0,0.4);
padding:15px;
border-radius:10px;
min-height:50px;
}

footer{
text-align:center;
padding:30px;
opacity:0.6;
}

</style>

</head>

<body>

<header>

<div class="logo">
FastTools AI
</div>

<div class="menu">
<a href="#">Home</a>
<a href="#">Tools</a>
<a href="#">AI Chat</a>
</div>

</header>

<div class="hero">

<h1>All AI Tools in One Place</h1>

<p>Your futuristic AI hub</p>

</div>

<div class="tools">

<div class="card">AI Chat</div>

<div class="card">Text Generator</div>

<div class="card">Business Ideas</div>

<div class="card">Brand Name Generator</div>

<div class="card">Story Generator</div>

<div class="card">Email Writer</div>

<div class="card">Product Description</div>

<div class="card">Social Media Post</div>

<div class="card">Marketing Ideas</div>

<div class="card">Startup Ideas</div>

</div>

<div class="chat">

<h2>AI Chat</h2>

<textarea id="input" placeholder="Ask anything..."></textarea>

<br>

<button onclick="askAI()">Ask AI</button>

<div id="result"></div>

</div>

<footer>

FastTools AI © 2026

</footer>

<script>

function askAI(){

let text=document.getElementById("input").value;

if(text==""){
document.getElementById("result").innerHTML="Write something first.";
return;
}

document.getElementById("result").innerHTML=
"<b>You:</b> "+text+"<br><br><b>AI:</b> I'm your AI assistant.";

}

</script>

</body>

</html>
